name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build kernel and U-Boot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          make all 2>&1 | tee build/ci-build.log

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rk-mainline-sb-build-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/ci-build.log
            build/kernel-build/arch/arm64/boot/Image
            build/mainline-u-boot-build-*/idbloader.img
            build/mainline-u-boot-build-*/u-boot.itb

